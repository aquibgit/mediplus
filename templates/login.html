{% load static %}

	{% include 'header.html' %}
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
{% if messages %}
              <div class="alert alert-light" role="alert">
                <ul class="messages">
        {% for message in messages %}
            <li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
        {% endfor %}
    </ul>
              </div>
      {% endif %}
